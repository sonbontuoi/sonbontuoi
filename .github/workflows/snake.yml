name: Generate Snake Animation

on:
  schedule:
    # Cứ 12 tiếng chạy 1 lần để cập nhật biểu đồ
    - cron: "0 */12 * * *" 
  workflow_dispatch: # Nút bấm để bạn có thể tự chạy thủ công bất cứ lúc nào

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: Platane/snk@v3
        with:
          # Lấy chính tên user của bạn
          github_user_name: ${{ github.repository_owner }}
          # Xuất ra 2 phiên bản: sáng và tối
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Đẩy 2 file ảnh vừa tạo sang một branch riêng tên là 'output'
      # Giúp nhánh chính (main) không bị rác bởi các commit tạo ảnh
      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
